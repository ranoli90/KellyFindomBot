# =============================================================================
# nginx.conf — KellyFindomBot Monitoring Dashboard Reverse Proxy
# =============================================================================
# Proxies HTTP → bot monitoring dashboard on port 8888.
# Used by the "nginx" service in docker-compose.yml.
#
# For production: place behind HTTPS termination (AWS ALB / Cloudflare).
# The ALB listener in infrastructure/terraform/main.tf handles SSL offload.
# =============================================================================

server {
    listen 80;
    server_name _;

    # Monitoring dashboard
    location / {
        proxy_pass         http://kelly-bot:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint — used by ALB / ECS health checks
    location /health {
        proxy_pass         http://kelly-bot:8888/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # Block noisy bot probes
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }
}
