name: Provision AWS Infrastructure (Terraform)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

permissions:
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.7'

      - name: Create Terraform state bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="kelly-prod-tfstate-${ACCOUNT_ID}"
          echo "TFSTATE_BUCKET=${BUCKET}" >> "$GITHUB_ENV"
          echo "AWS_ACCOUNT_ID=${ACCOUNT_ID}" >> "$GITHUB_ENV"

          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api create-bucket --bucket "$BUCKET" --region "${{ env.AWS_REGION }}"
            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$BUCKET" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            echo "Created state bucket: ${BUCKET}"
          else
            echo "State bucket already exists: ${BUCKET}"
          fi

      - name: Write terraform.tfvars
        run: |
          # Bot secrets (telegram_api_id, telegram_api_hash, admin_user_id, etc.) are seeded
          # into AWS Secrets Manager separately — by bootstrap.sh or manually via the AWS
          # console. Terraform creates the Secrets Manager resource with placeholder strings;
          # the `lifecycle { ignore_changes = [secret_string] }` block prevents Terraform
          # from overwriting values you have already seeded there.
          cat > terraform.tfvars <<EOF
          # Auto-generated by terraform.yml — do not commit
          aws_region          = "${{ env.AWS_REGION }}"
          environment         = "prod"
          telegram_api_id     = "LOADED_FROM_SECRETS_MANAGER"
          telegram_api_hash   = "LOADED_FROM_SECRETS_MANAGER"
          admin_user_id       = "LOADED_FROM_SECRETS_MANAGER"
          task_cpu            = "512"
          task_memory         = "1024"
          allowed_cidr_blocks = ["0.0.0.0/0"]
          alert_email         = ""
          EOF

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ env.TFSTATE_BUCKET }}"

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -compact-warnings

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -compact-warnings

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -compact-warnings

      - name: Post-apply summary
        if: github.event.inputs.action == 'apply'
        run: |
          echo "## Infrastructure Provisioned" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Output | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECR URL | \`$(terraform output -raw ecr_repository_url)\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECS Cluster | \`$(terraform output -raw ecs_cluster_name)\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ECS Service | \`$(terraform output -raw ecs_service_name)\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ALB DNS | \`$(terraform output -raw alb_dns_name)\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**AWS Account ID:** \`${{ env.AWS_ACCOUNT_ID }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Next steps" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Add \`AWS_ACCOUNT_ID=${{ env.AWS_ACCOUNT_ID }}\` as a GitHub secret (for the deploy workflow)" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Seed your bot secrets into AWS Secrets Manager: \`kellyfindombot/prod/secrets\`" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Generate a Telegram session file locally and upload it to S3" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Trigger the **Deploy** workflow (or push to main)" >> "$GITHUB_STEP_SUMMARY"
